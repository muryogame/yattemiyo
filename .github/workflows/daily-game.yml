name: Daily New Game

on:
  schedule:
    # 毎日 午前9時(JST) = UTC 0:00
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  add-game:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run add_game script
        run: python add_game.py

      - name: Commit & Push
        run: |
          git config --global user.name "GameBot"
          git config --global user.email "bot@gamerand.jp"
          git add .
          git diff --staged --quiet || git commit -m "🎮 新しいゲームを追加 ($(date '+%Y-%m-%d'))"
          git push
