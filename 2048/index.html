<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048 パズル - ゲームランド</title>
  <meta name="description" content="数字をスライドして合わせる大人気パズル！2048を目指せ。スマホ・PC対応。">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    .top-bar { background: #16213e; padding: 12px 20px; display: flex; align-items: center; gap: 16px; border-bottom: 2px solid #f4a261; }
    .top-bar a { color: #f4a261; text-decoration: none; font-size: 0.9rem; }
    .top-bar h1 { font-size: 1.1rem; flex: 1; }
    .ad-banner { background: #0f3460; border: 1px dashed #333; text-align: center; padding: 8px; font-size: 0.7rem; color: #555; }
    main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    .scoreboard { display: flex; gap: 16px; margin-bottom: 16px; }
    .score-box { background: #b5541e; border-radius: 8px; padding: 8px 18px; text-align: center; min-width: 80px; }
    .score-label { font-size: 0.65rem; color: #ffcc99; text-transform: uppercase; }
    .score-value { font-size: 1.4rem; font-weight: 900; }
    .grid-container {
      background: #bbada0;
      border-radius: 8px;
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      width: min(400px, 94vw);
    }
    .cell {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 6px;
      background: #cdc1b4;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: clamp(1rem, 4vw, 1.8rem);
      transition: background 0.1s;
      color: #776e65;
    }
    .cell[data-val="2"]    { background: #eee4da; }
    .cell[data-val="4"]    { background: #ede0c8; }
    .cell[data-val="8"]    { background: #f2b179; color: #fff; }
    .cell[data-val="16"]   { background: #f59563; color: #fff; }
    .cell[data-val="32"]   { background: #f67c5f; color: #fff; }
    .cell[data-val="64"]   { background: #f65e3b; color: #fff; }
    .cell[data-val="128"]  { background: #edcf72; color: #fff; font-size: clamp(0.9rem,3vw,1.5rem); }
    .cell[data-val="256"]  { background: #edcc61; color: #fff; font-size: clamp(0.9rem,3vw,1.5rem); }
    .cell[data-val="512"]  { background: #edc850; color: #fff; font-size: clamp(0.9rem,3vw,1.5rem); }
    .cell[data-val="1024"] { background: #edc53f; color: #fff; font-size: clamp(0.7rem,2.5vw,1.1rem); }
    .cell[data-val="2048"] { background: #edc22e; color: #fff; font-size: clamp(0.7rem,2.5vw,1.1rem); }
    .game-btn {
      margin-top: 16px; padding: 12px 32px; border: none; border-radius: 24px;
      background: linear-gradient(135deg, #f4a261, #b5541e); color: #fff;
      font-size: 1rem; font-weight: 700; cursor: pointer;
    }
    .overlay-2048 {
      position: absolute; inset: 0; background: rgba(238,228,218,0.85);
      display: none; flex-direction: column; align-items: center; justify-content: center;
      border-radius: 8px; gap: 12px; color: #776e65;
    }
    .overlay-2048 h2 { font-size: 2rem; }
    .wrap { position: relative; }
    .hint { color: #888; font-size: 0.82rem; margin-top: 12px; text-align: center; }
  </style>
</head>
<body>
<div class="top-bar">
  <a href="../">← ゲーム一覧</a>
  <h1>🔢 2048</h1>
</div>
<div class="ad-banner">広告</div>

<main>
  <div class="scoreboard">
    <div class="score-box"><div class="score-label">スコア</div><div class="score-value" id="score">0</div></div>
    <div class="score-box"><div class="score-label">ベスト</div><div class="score-value" id="best">0</div></div>
  </div>

  <div class="wrap">
    <div class="grid-container" id="grid"></div>
    <div class="overlay-2048" id="overlay2048">
      <h2 id="overlayMsg">🎉</h2>
      <p id="overlayScore"></p>
      <button class="game-btn" onclick="init()">もう一度！</button>
    </div>
  </div>

  <button class="game-btn" onclick="init()">🔄 リセット</button>
  <p class="hint">⬆⬇⬅➡ 矢印キーかスワイプで操作。同じ数字が重なると合体！2048を目指せ！</p>
</main>

<div class="ad-banner">広告</div>

<script>
let board, score, best;

function init() {
  board = Array.from({length:4},()=>Array(4).fill(0));
  score = 0;
  best = parseInt(localStorage.getItem('2048_best')||'0');
  addRandom(); addRandom();
  document.getElementById('overlay2048').style.display = 'none';
  updateUI();
}

function addRandom() {
  const empty = [];
  for(let r=0;r<4;r++) for(let c=0;c<4;c++) if(!board[r][c]) empty.push([r,c]);
  if(!empty.length) return;
  const [r,c] = empty[Math.floor(Math.random()*empty.length)];
  board[r][c] = Math.random()<0.9?2:4;
}

function updateUI() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for(let r=0;r<4;r++) for(let c=0;c<4;c++) {
    const v = board[r][c];
    const cell = document.createElement('div');
    cell.className = 'cell';
    if(v) { cell.textContent = v; cell.dataset.val = v; }
    grid.appendChild(cell);
  }
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;
}

function slide(row) {
  const nums = row.filter(x=>x);
  const merged = [];
  let i=0, added=0;
  while(i<nums.length) {
    if(i+1<nums.length && nums[i]===nums[i+1]) {
      const v=nums[i]*2; merged.push(v); score+=v; added+=v; i+=2;
    } else { merged.push(nums[i]); i++; }
  }
  while(merged.length<4) merged.push(0);
  return merged;
}

function move(dir) {
  const prev = JSON.stringify(board);
  if(dir==='left') board = board.map(r=>slide(r));
  if(dir==='right') board = board.map(r=>slide([...r].reverse()).reverse());
  if(dir==='up'||dir==='down') {
    for(let c=0;c<4;c++) {
      let col = board.map(r=>r[c]);
      if(dir==='down') col.reverse();
      col = slide(col);
      if(dir==='down') col.reverse();
      board.forEach((r,i)=>r[c]=col[i]);
    }
  }
  if(JSON.stringify(board)!==prev) {
    addRandom();
    if(score>best) { best=score; localStorage.setItem('2048_best',best); }
    updateUI();
    checkEnd();
  }
}

function checkEnd() {
  if(board.some(r=>r.some(v=>v===2048))) {
    showOverlay('🎉 2048達成！', score);
    return;
  }
  for(let r=0;r<4;r++) for(let c=0;c<4;c++) {
    if(!board[r][c]) return;
    if(c<3&&board[r][c]===board[r][c+1]) return;
    if(r<3&&board[r][c]===board[r+1][c]) return;
  }
  showOverlay('😭 ゲームオーバー', score);
}

function showOverlay(msg, sc) {
  const ov = document.getElementById('overlay2048');
  document.getElementById('overlayMsg').textContent = msg;
  document.getElementById('overlayScore').textContent = `スコア: ${sc}`;
  ov.style.display = 'flex';
}

document.addEventListener('keydown', e => {
  const map = {ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};
  if(map[e.key]) { e.preventDefault(); move(map[e.key]); }
});

let sx, sy;
document.getElementById('grid').addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
document.getElementById('grid').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)<10&&Math.abs(dy)<10) return;
  if(Math.abs(dx)>Math.abs(dy)) move(dx>0?'right':'left');
  else move(dy>0?'down':'up');
},{passive:true});

init();
</script>
</body>
</html>
