<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スネークゲーム - ゲームランド</title>
  <meta name="description" content="古典的なスネークゲーム！えさを食べてどこまで長くなれるか挑戦しよう。スマホ・PC両対応。">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    .top-bar { background: #16213e; padding: 12px 20px; display: flex; align-items: center; gap: 16px; border-bottom: 2px solid #6c63ff; }
    .top-bar a { color: #6c63ff; text-decoration: none; font-size: 0.9rem; }
    .top-bar h1 { font-size: 1.1rem; flex: 1; }
    .ad-banner { background: #0f3460; border: 1px dashed #333; text-align: center; padding: 8px; font-size: 0.7rem; color: #555; }
    main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    .scoreboard { display: flex; gap: 24px; margin-bottom: 16px; }
    .score-box { background: #16213e; border-radius: 12px; padding: 10px 20px; text-align: center; border: 1px solid #2a3060; }
    .score-label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
    .score-value { font-size: 1.6rem; font-weight: 900; color: #6c63ff; }
    #gameCanvas { border: 3px solid #6c63ff; border-radius: 8px; display: block; max-width: 100%; box-shadow: 0 0 30px rgba(108,99,255,0.3); }
    .controls { margin-top: 16px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .btn-row { display: flex; gap: 8px; }
    .ctrl-btn {
      width: 56px; height: 56px; border: none; border-radius: 12px;
      background: #16213e; color: #fff; font-size: 1.4rem; cursor: pointer;
      border: 2px solid #2a3060; transition: background 0.1s;
    }
    .ctrl-btn:active { background: #6c63ff; }
    .game-btn {
      margin-top: 12px; padding: 12px 32px; border: none; border-radius: 24px;
      background: linear-gradient(135deg, #6c63ff, #8b63ff); color: #fff;
      font-size: 1rem; font-weight: 700; cursor: pointer;
    }
    .difficulty { display: flex; gap: 8px; margin-bottom: 8px; }
    .diff-btn { padding: 6px 14px; border-radius: 16px; border: 2px solid #333; background: transparent; color: #888; cursor: pointer; font-size: 0.8rem; }
    .diff-btn.active { border-color: #6c63ff; color: #fff; background: rgba(108,99,255,0.2); }
    .overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      border-radius: 6px; gap: 12px;
    }
    .canvas-wrap { position: relative; }
    .overlay h2 { font-size: 2rem; }
    .overlay p { color: #888; }
    .game-info { color: #888; font-size: 0.82rem; margin-top: 12px; text-align: center; }
  </style>
</head>
<body>
<div class="top-bar">
  <a href="../">← ゲーム一覧</a>
  <h1>🐍 スネークゲーム</h1>
</div>
<div class="ad-banner">広告 <!-- AdSense: data-ad-slot="XXXXXX" --></div>

<main>
  <div class="scoreboard">
    <div class="score-box"><div class="score-label">スコア</div><div class="score-value" id="score">0</div></div>
    <div class="score-box"><div class="score-label">ハイスコア</div><div class="score-value" id="highScore">0</div></div>
    <div class="score-box"><div class="score-label">レベル</div><div class="score-value" id="level">1</div></div>
  </div>

  <div class="difficulty">
    <button class="diff-btn active" onclick="setDiff(1, this)">かんたん</button>
    <button class="diff-btn" onclick="setDiff(2, this)">ふつう</button>
    <button class="diff-btn" onclick="setDiff(3, this)">むずかしい</button>
  </div>

  <div class="canvas-wrap">
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="overlay" id="overlay">
      <h2>🐍 スネーク</h2>
      <p>矢印キーかボタンで操作</p>
      <button class="game-btn" onclick="startGame()">スタート！</button>
    </div>
  </div>

  <div class="controls">
    <div class="btn-row"><button class="ctrl-btn" onclick="changeDir(0,-1)">⬆</button></div>
    <div class="btn-row">
      <button class="ctrl-btn" onclick="changeDir(-1,0)">⬅</button>
      <button class="ctrl-btn" onclick="changeDir(0,1)">⬇</button>
      <button class="ctrl-btn" onclick="changeDir(1,0)">➡</button>
    </div>
  </div>
  <button class="game-btn" id="restartBtn" style="display:none" onclick="startGame()">もう一度！</button>
  <p class="game-info">🍎 えさを食べるたびに長くなる！壁や自分の体にぶつかったらゲームオーバー。</p>
</main>

<div class="ad-banner">広告 <!-- AdSense Rectangle --></div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const GRID = 20;
const COLS = canvas.width / GRID;
const ROWS = canvas.height / GRID;

let snake, dir, nextDir, food, score, running, animId, interval, difficulty;
let highScore = parseInt(localStorage.getItem('snake_hs') || '0');
let level = 1;
let diffSpeed = [0, 180, 130, 80];

document.getElementById('highScore').textContent = highScore;

function setDiff(d, btn) {
  difficulty = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
difficulty = 1;

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('restartBtn').style.display = 'none';
  snake = [{x:10, y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1, y:0};
  nextDir = {x:1, y:0};
  score = 0;
  level = 1;
  running = true;
  updateScore();
  placeFood();
  clearInterval(animId);
  animId = setInterval(gameLoop, diffSpeed[difficulty]);
}

function placeFood() {
  let pos;
  do {
    pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
  } while (snake.some(s => s.x===pos.x && s.y===pos.y));
  food = pos;
}

function gameLoop() {
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS || snake.some(s=>s.x===head.x&&s.y===head.y)) {
    gameOver(); return;
  }
  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score += 10 * difficulty;
    if (score > highScore) { highScore = score; localStorage.setItem('snake_hs', highScore); }
    level = Math.floor(score / 50) + 1;
    updateScore();
    placeFood();
  } else {
    snake.pop();
  }
  draw();
}

function draw() {
  ctx.fillStyle = '#0d0d1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  for (let i=0; i<COLS; i++) { ctx.beginPath(); ctx.moveTo(i*GRID,0); ctx.lineTo(i*GRID,canvas.height); ctx.stroke(); }
  for (let j=0; j<ROWS; j++) { ctx.beginPath(); ctx.moveTo(0,j*GRID); ctx.lineTo(canvas.width,j*GRID); ctx.stroke(); }
  // Food
  ctx.font = `${GRID}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🍎', food.x*GRID+GRID/2, food.y*GRID+GRID/2);
  // Snake
  snake.forEach((s, i) => {
    const t = i / snake.length;
    ctx.fillStyle = i===0 ? '#6c63ff' : `hsl(${120+t*60},80%,${50-t*20}%)`;
    ctx.beginPath();
    ctx.roundRect(s.x*GRID+1, s.y*GRID+1, GRID-2, GRID-2, 4);
    ctx.fill();
    if (i===0) {
      ctx.fillStyle = '#fff';
      const ex = dir.x===1?10:dir.x===-1?4:6, ey = dir.y===1?10:dir.y===-1?4:6;
      ctx.beginPath(); ctx.arc(s.x*GRID+ex, s.y*GRID+ey, 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(s.x*GRID+GRID-ex, s.y*GRID+ey, 2, 0, Math.PI*2); ctx.fill();
    }
  });
}

function gameOver() {
  clearInterval(animId);
  running = false;
  const ov = document.getElementById('overlay');
  ov.style.display = 'flex';
  ov.innerHTML = `<h2>💀 ゲームオーバー</h2><p>スコア: <strong>${score}</strong></p><p>ハイスコア: <strong>${highScore}</strong></p><button class="game-btn" onclick="startGame()">もう一度！</button>`;
}

function updateScore() {
  document.getElementById('score').textContent = score;
  document.getElementById('highScore').textContent = highScore;
  document.getElementById('level').textContent = level;
}

function changeDir(x, y) {
  if ((x!==0 && dir.x===0) || (y!==0 && dir.y===0)) nextDir = {x, y};
}

document.addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  if (e.key==='ArrowUp') changeDir(0,-1);
  if (e.key==='ArrowDown') changeDir(0,1);
  if (e.key==='ArrowLeft') changeDir(-1,0);
  if (e.key==='ArrowRight') changeDir(1,0);
});

// Touch swipe
let tx, ty;
canvas.addEventListener('touchstart', e => { tx=e.touches[0].clientX; ty=e.touches[0].clientY; }, {passive:true});
canvas.addEventListener('touchend', e => {
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if (Math.abs(dx)>Math.abs(dy)) changeDir(dx>0?1:-1,0);
  else changeDir(0,dy>0?1:-1);
}, {passive:true});

// Responsive canvas
function resize() {
  const size = Math.min(400, window.innerWidth-40);
  canvas.style.width = size+'px';
  canvas.style.height = size+'px';
}
resize();
window.addEventListener('resize', resize);
draw();
</script>
</body>
</html>
