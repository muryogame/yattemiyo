<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>神経衰弱 - ゲームランド</title>
  <meta name="description" content="カードをめくって同じ絵柄を見つける神経衰弱ゲーム！記憶力を鍛えよう。全年齢向け。">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#1a1a2e; color:#e0e0e0; font-family:'Segoe UI',sans-serif; min-height:100vh; display:flex; flex-direction:column; }
    .top-bar { background:#16213e; padding:12px 20px; display:flex; align-items:center; gap:16px; border-bottom:2px solid #ab47bc; }
    .top-bar a { color:#ab47bc; text-decoration:none; font-size:0.9rem; }
    .top-bar h1 { font-size:1.1rem; flex:1; }
    .ad-banner { background:#0f3460; border:1px dashed #333; text-align:center; padding:8px; font-size:0.7rem; color:#555; }
    main { flex:1; display:flex; flex-direction:column; align-items:center; padding:16px; }
    .stats { display:flex; gap:20px; margin-bottom:14px; }
    .stat { background:#16213e; border-radius:10px; padding:8px 18px; text-align:center; border:1px solid #2a3060; }
    .stat-label { font-size:0.65rem; color:#888; text-transform:uppercase; }
    .stat-value { font-size:1.3rem; font-weight:900; color:#ab47bc; }
    .difficulty-selector { display:flex; gap:8px; margin-bottom:12px; }
    .d-btn { padding:6px 14px; border-radius:16px; border:2px solid #333; background:transparent; color:#888; cursor:pointer; font-size:0.8rem; }
    .d-btn.active { border-color:#ab47bc; color:#fff; background:rgba(171,71,188,0.2); }
    .card-grid { display:grid; gap:10px; max-width:500px; width:100%; }
    .card {
      aspect-ratio:1; background:#16213e; border-radius:12px; border:2px solid #2a3060;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      font-size:clamp(1.2rem,5vw,2.2rem); transition:transform 0.3s, background 0.2s;
      user-select:none; -webkit-tap-highlight-color:transparent;
    }
    .card.flipped { background:#6a0572; border-color:#ab47bc; transform:scale(1.05); }
    .card.matched { background:#2d6a4f; border-color:#43e97b; cursor:default; }
    .card.hidden { font-size:0; background:#16213e; }
    .card-back { font-size:1.5rem; }
    .game-btn { margin-top:16px; padding:12px 32px; border:none; border-radius:24px; background:linear-gradient(135deg,#ab47bc,#6a0572); color:#fff; font-size:1rem; font-weight:700; cursor:pointer; }
    .result-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); display:none; align-items:center; justify-content:center; z-index:50; }
    .result-box { background:#16213e; border-radius:20px; padding:32px; text-align:center; border:2px solid #ab47bc; }
    .result-box h2 { font-size:2rem; margin-bottom:8px; }
    .hint { color:#888; font-size:0.8rem; margin-top:10px; }
  </style>
</head>
<body>
<div class="top-bar">
  <a href="../">← ゲーム一覧</a>
  <h1>🃏 神経衰弱</h1>
</div>
<div class="ad-banner">広告</div>

<main>
  <div class="stats">
    <div class="stat"><div class="stat-label">ターン</div><div class="stat-value" id="turns">0</div></div>
    <div class="stat"><div class="stat-label">残り組</div><div class="stat-value" id="remaining">0</div></div>
    <div class="stat"><div class="stat-label">時間</div><div class="stat-value" id="timer">0</div></div>
  </div>
  <div class="difficulty-selector">
    <button class="d-btn active" onclick="startGame(4,this)">4×3 かんたん</button>
    <button class="d-btn" onclick="startGame(4,this)">4×4 ふつう</button>
    <button class="d-btn" onclick="startGame(6,this)">6×5 むずかしい</button>
  </div>
  <div class="card-grid" id="cardGrid"></div>
  <button class="game-btn" onclick="restartGame()">🔄 シャッフル</button>
  <p class="hint">カードをクリックしてめくる！同じ絵柄のペアを見つけよう。</p>
</main>

<div class="ad-banner">広告</div>

<div class="result-overlay" id="resultOverlay">
  <div class="result-box">
    <h2>🎉 クリア！</h2>
    <p id="resultMsg"></p>
    <br>
    <button class="game-btn" onclick="restartGame();document.getElementById('resultOverlay').style.display='none'">もう一度！</button>
  </div>
</div>

<script>
const EMOJIS = ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐙','🦋','🌸','⭐','🍎','🍊','🍋','🍇','🎵','🌈'];
let cards = [], flipped = [], matched = 0, turns = 0, cols = 4, rows = 3, timer = 0, timerInterval, gameStarted = false;

function startGame(c, btn) {
  cols = c;
  rows = c === 6 ? 5 : c === 4 && btn && btn.textContent.includes('4×4') ? 4 : 3;
  if(btn) {
    document.querySelectorAll('.d-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  }
  restartGame();
}

function restartGame() {
  clearInterval(timerInterval);
  timer = 0; turns = 0; matched = 0; flipped = []; gameStarted = false;
  document.getElementById('turns').textContent = '0';
  document.getElementById('timer').textContent = '0';
  const total = cols * rows;
  const pairs = total / 2;
  const pool = EMOJIS.slice(0, pairs);
  cards = [...pool, ...pool].sort(()=>Math.random()-0.5);
  document.getElementById('remaining').textContent = pairs;
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('cardGrid');
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  grid.innerHTML = '';
  cards.forEach((em, i) => {
    const div = document.createElement('div');
    div.className = 'card';
    div.dataset.index = i;
    div.dataset.emoji = em;
    div.innerHTML = '<span class="card-back">❓</span>';
    div.addEventListener('click', flipCard);
    grid.appendChild(div);
  });
}

function flipCard() {
  if(!gameStarted) {
    gameStarted = true;
    timerInterval = setInterval(()=>{timer++;document.getElementById('timer').textContent=timer;},1000);
  }
  const i = parseInt(this.dataset.index);
  if(this.classList.contains('matched')||this.classList.contains('flipped')||flipped.length>=2) return;
  this.classList.add('flipped');
  this.textContent = this.dataset.emoji;
  flipped.push(this);
  if(flipped.length===2) {
    turns++;
    document.getElementById('turns').textContent = turns;
    if(flipped[0].dataset.emoji===flipped[1].dataset.emoji) {
      flipped.forEach(c=>c.classList.add('matched'));
      flipped=[];
      matched++;
      const remaining = cards.length/2 - matched;
      document.getElementById('remaining').textContent = remaining;
      if(remaining===0) {
        clearInterval(timerInterval);
        setTimeout(()=>{
          document.getElementById('resultMsg').textContent=`${turns}ターン・${timer}秒でクリア！`;
          document.getElementById('resultOverlay').style.display='flex';
        },500);
      }
    } else {
      setTimeout(()=>{
        flipped.forEach(c=>{c.classList.remove('flipped');c.innerHTML='<span class="card-back">❓</span>';});
        flipped=[];
      },800);
    }
  }
}

startGame(4, null);
</script>
</body>
</html>
